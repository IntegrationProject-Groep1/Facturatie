name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
      - prod
    tags:
      - 'v*'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      BILLING_API_URL: ${{ secrets.BILLING_API_URL }}
      BILLING_API_USERNAME: ${{ secrets.BILLING_API_USERNAME }}
      BILLING_API_TOKEN: ${{ secrets.BILLING_API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 src/ --max-line-length=120 --statistics

      - name: Run unit tests
        run: |
          pytest -v